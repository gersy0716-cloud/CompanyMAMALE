# Nginx 配置 - 用于单页应用路由
# 将此配置添加到你的 Nginx 服务器配置中

server {
    listen 80;
    server_name app.520ai.cc;

    # 应用部署在 /plat/public/20251220005410/ 目录下
    location /plat/public/20251220005410/ {
        alias /path/to/your/dist/;  # 替换为实际的构建输出目录（build 后的 dist 目录）
        index index.html;

        # 关键配置：处理 SPA 路由，所有不存在的文件都返回 index.html
        try_files $uri $uri/ /plat/public/20251220005410/index.html;

        # CORS 配置（如果需要）
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
        add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
    }

    # 缓存静态资源（JS、CSS、图片等）
    location ~ ^/plat/public/20251220005410/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        alias /path/to/your/dist/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# 或者，如果你的服务器配置不同，可以使用这个简化版本：
# location /plat/public/20251220005410 {
#     alias /path/to/your/dist;
#     try_files $uri $uri/ /plat/public/20251220005410/index.html;
# }
