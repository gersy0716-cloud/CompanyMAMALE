<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect width="256" height="256" rx="50" fill="url(#grad)"/>

  <!-- 演示文稿图标 -->
  <g transform="translate(48, 48)">
    <!-- 幻灯片 -->
    <rect x="20" y="20" width="120" height="90" rx="8" fill="white" opacity="0.9"/>
    <rect x="30" y="30" width="100" height="10" rx="2" fill="#667eea"/>
    <rect x="30" y="50" width="80" height="6" rx="2" fill="#667eea" opacity="0.6"/>
    <rect x="30" y="62" width="60" height="6" rx="2" fill="#667eea" opacity="0.6"/>

    <!-- 播放按钮 -->
    <circle cx="80" cy="140" r="25" fill="white"/>
    <path d="M 75 130 L 90 140 L 75 150 Z" fill="#667eea"/>
  </g>

  <!-- 文字 -->
  <text x="128" y="220" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">播放器</text>
</svg>
