<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安静管家 - 声音控制的花园</title>

    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Three.js r128 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #5FA684 0%, #B0FC84 100%);
        }

        .glass-panel {
            background: rgba(44, 103, 123, 0.8);
            backdrop-filter: blur(10px);
        }

        .status-indicator {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px currentColor;
        }

        .status-quiet {
            background: #B0FC84;
            color: #B0FC84;
        }

        .status-loud {
            background: #ff4444;
            color: #ff4444;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }

        .pulse-anim {
            animation: pulse 2s ease-in-out infinite;
        }

        .progress-bar-transition {
            transition: width 0.3s ease-out;
        }

        .progress-bar-instant {
            transition: none;
        }
    </style>
</head>

<body>
    <!-- 3D Canvas Container -->
    <div id="canvas-container"></div>

    <!-- Top Title Bar -->
    <div class="fixed top-0 left-0 right-0 flex justify-center pt-6 z-10">
        <div class="glass-panel px-8 py-3 rounded-full">
            <h1 class="text-2xl font-bold text-white">安静管家</h1>
        </div>
    </div>

    <!-- Status Indicator -->
    <div class="fixed top-6 right-6 z-10 flex items-center gap-3">
        <div id="status-indicator" class="status-indicator status-quiet pulse-anim"></div>
        <span id="status-text" class="text-white font-semibold text-sm">安静</span>
    </div>

    <!-- Bottom Control Panel -->
    <div class="fixed bottom-0 left-0 right-0 flex justify-center pb-6 z-10">
        <div class="glass-panel px-8 py-6 rounded-3xl mx-4 max-w-6xl w-full">
            <!-- 左右模块组布局 - Flex容器确保顶部和底部对齐 -->
            <div style="display: flex; gap: 24px; align-items: stretch;">
                <!-- 左侧模块组：三个信息卡片 -->
                <div style="display: flex; flex-direction: column; justify-content: space-between; width: 280px;">
                    <!-- Real-time Decibel -->
                    <div class="bg-white bg-opacity-20 rounded-xl p-3 flex justify-between items-center">
                        <div class="text-sm text-gray-200">实时分贝</div>
                        <div class="text-lg font-bold text-white">
                            <span id="decibel-value">0</span> dB
                        </div>
                    </div>

                    <!-- Bloomed Flowers -->
                    <div class="bg-white bg-opacity-20 rounded-xl p-3 flex justify-between items-center">
                        <div class="text-sm text-gray-200">已开花数</div>
                        <div class="text-lg font-bold text-white">
                            <span id="flower-count">0</span> / 40
                        </div>
                    </div>

                    <!-- Remaining Time -->
                    <div class="bg-white bg-opacity-20 rounded-xl p-3 flex justify-between items-center">
                        <div class="text-sm text-gray-200">剩余时间</div>
                        <div class="text-lg font-bold text-white">
                            <span id="remaining-time">0</span> 秒
                        </div>
                    </div>
                </div>

                <!-- 右侧模块组：分贝阈值、生长进度、按钮（填满剩余空间） -->
                <div style="display: flex; flex-direction: column; justify-content: space-between; flex: 1;">
                    <!-- Decibel Threshold Slider -->
                    <div class="mb-4">
                        <div class="flex justify-between items-center mb-2">
                            <label class="text-sm text-gray-200">分贝阈值</label>
                            <span class="text-sm font-bold text-white">
                                <span id="threshold-value">60</span> dB
                            </span>
                        </div>
                        <input type="range" id="threshold-slider" min="40" max="120" value="60"
                            class="w-full h-2 rounded-lg appearance-none cursor-pointer"
                            style="background: linear-gradient(to right, #5FA684, #B0FC84);" />
                    </div>

                    <!-- Growth Progress Bar -->
                    <div class="mb-4">
                        <div class="text-sm text-gray-200 mb-2">生长进度</div>
                        <div class="w-full bg-gray-700 rounded-full h-4 overflow-hidden">
                            <div id="progress-bar" class="gradient-bg h-full progress-bar-transition" style="width: 0%">
                            </div>
                        </div>
                    </div>

                    <!-- Function Buttons -->
                    <div class="flex gap-3">
                        <button id="start-btn"
                            class="gradient-bg flex-1 py-3 rounded-xl text-white font-semibold hover:opacity-90 transition">
                            开始监听
                        </button>
                        <button id="reset-btn"
                            class="bg-red-500 bg-opacity-70 px-6 py-3 rounded-xl text-white font-semibold hover:opacity-90 transition">
                            重置进度
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="success-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-20">
        <div class="bg-white rounded-3xl p-8 max-w-md mx-4 text-center">
            <div class="text-6xl mb-4">🎉</div>
            <h2 class="text-3xl font-bold mb-4" style="color: #2C677B;">恭喜！</h2>
            <p class="text-lg text-gray-700 mb-6">
                你成功培育了 40 朵美丽的花朵！<br>
            </p>
            <button id="restart-btn"
                class="gradient-bg px-8 py-3 rounded-xl text-white font-semibold hover:opacity-90 transition">
                重新开始
            </button>
        </div>
    </div>

    <script>
        // ==================== 全局变量和配置 ====================
        let scene, camera, renderer, ground;
        let ambientLight, directionalLight;
        let currentFlower = null;
        let bloomedFlowers = [];
        let growthProgress = 0;
        let growthStartTime = null;
        let decibelThreshold = 60;
        let currentDecibel = 0;
        let isListening = false;

        // 音频相关
        let audioContext, analyser, microphone, dataArray;

        // 花朵网格配置 (8列 × 5行 = 40朵)
        const GRID_COLS = 8;
        const GRID_ROWS = 5;
        const FLOWER_SPACING = 6;  // 增加间距
        const GROWTH_DURATION = 60000; // 60秒

        // 花朵缩放比例
        const FLOWER_SCALE = 2.0;  // 花朵放大2倍

        // ==================== Flower类：3D花朵模型与动画 ====================
        class Flower {
            constructor(x, z) {
                this.position = { x, z };
                this.group = new THREE.Group();
                this.group.scale.set(FLOWER_SCALE, FLOWER_SCALE, FLOWER_SCALE);  // 放大花朵
                this.createModel();
                this.group.position.set(x, 0, z);
                scene.add(this.group);
            }

            createModel() {
                // 花茎 (绿色圆柱体，大幅增加细分段数 - 64段)
                const stemGeometry = new THREE.CylinderGeometry(0.05, 0.08, 1, 64);
                const stemMaterial = new THREE.MeshPhongMaterial({
                    color: 0x4a7c59,
                    shininess: 30,
                    specular: 0x225533
                });
                this.stem = new THREE.Mesh(stemGeometry, stemMaterial);
                this.stem.castShadow = true;
                this.stem.receiveShadow = true;
                this.stem.position.y = 0.5;
                this.group.add(this.stem);

                // 叶子组 (超高细分64x64并添加曲线)
                this.leaves = [];
                for (let i = 0; i < 2; i++) {
                    const leafGeometry = new THREE.PlaneGeometry(0.3, 0.5, 128, 128);

                    // 为叶子添加自然弧度
                    const positions = leafGeometry.attributes.position;
                    for (let j = 0; j < positions.count; j++) {
                        const x = positions.getX(j);
                        const y = positions.getY(j);
                        // 沿X轴添加弧度
                        const z = Math.sin(x * Math.PI) * 0.05;
                        positions.setZ(j, z);
                        // 沿Y轴添加轻微下垂
                        const zDroop = -Math.abs(y) * 0.03;
                        positions.setZ(j, z + zDroop);
                    }
                    leafGeometry.computeVertexNormals();

                    const leafMaterial = new THREE.MeshPhongMaterial({
                        color: 0x5FA684,
                        side: THREE.DoubleSide,
                        shininess: 20,
                        specular: 0x88aa99
                    });
                    const leaf = new THREE.Mesh(leafGeometry, leafMaterial);
                    leaf.castShadow = true;
                    leaf.receiveShadow = true;
                    leaf.rotation.y = (i * Math.PI);
                    this.leaves.push(leaf);
                    this.group.add(leaf);
                }

                // 花朵中心 (黄色球体，超高细分 - 64x64)
                const centerGeometry = new THREE.SphereGeometry(0.15, 128, 128);
                const centerMaterial = new THREE.MeshPhongMaterial({
                    color: 0xffeb3b,
                    shininess: 50,
                    specular: 0xffff88,
                    emissive: 0x443300,
                    emissiveIntensity: 0.1
                });
                this.flowerCenter = new THREE.Mesh(centerGeometry, centerMaterial);
                this.flowerCenter.castShadow = true;
                this.flowerCenter.receiveShadow = true;
                this.group.add(this.flowerCenter);

                // 花瓣 (粉色，超高细分64x64，添加自然弧度)
                this.petals = [];
                for (let i = 0; i < 6; i++) {
                    const petalGeometry = new THREE.PlaneGeometry(0.4, 0.6, 128, 128);

                    // 为花瓣添加自然的弯曲形状
                    const positions = petalGeometry.attributes.position;
                    for (let j = 0; j < positions.count; j++) {
                        const x = positions.getX(j);
                        const y = positions.getY(j);

                        // 沿Y轴（长度方向）添加弧度
                        const curveFactor = Math.abs(y) / 0.3; // 0到1
                        const zCurve = Math.sin(curveFactor * Math.PI * 0.5) * 0.1;

                        // 沿X轴（宽度方向）添加凹陷
                        const xCurve = -Math.pow(Math.abs(x) / 0.2, 2) * 0.05;

                        positions.setZ(j, zCurve + xCurve);
                    }
                    petalGeometry.computeVertexNormals();

                    const petalMaterial = new THREE.MeshPhongMaterial({
                        color: 0xff69b4,
                        side: THREE.DoubleSide,
                        shininess: 40,
                        specular: 0xff99cc,
                        transparent: true,
                        opacity: 0.95
                    });
                    const petal = new THREE.Mesh(petalGeometry, petalMaterial);
                    petal.castShadow = true;
                    petal.receiveShadow = true;
                    this.petals.push(petal);
                    this.group.add(petal);
                }

                // 初始状态：全部隐藏
                this.update(0);
            }

            // 根据进度 (0-1) 更新花朵形态
            update(progress) {
                // 阶段1: 种子 (0.0 - 0.2) - 全部隐藏
                if (progress < 0.2) {
                    this.stem.scale.y = 0.01;
                    this.stem.visible = false;
                    this.leaves.forEach(leaf => leaf.visible = false);
                    this.flowerCenter.visible = false;
                    this.petals.forEach(petal => petal.visible = false);
                }
                // 阶段2: 发芽 (0.2 - 0.4) - 花茎生长，小叶出现
                else if (progress < 0.4) {
                    const stage = (progress - 0.2) / 0.2;
                    this.stem.visible = true;
                    this.stem.scale.y = 0.3 * stage;
                    this.stem.position.y = 0.5 * this.stem.scale.y;

                    this.leaves.forEach((leaf, i) => {
                        leaf.visible = true;
                        leaf.scale.set(0.5 * stage, 0.5 * stage, 1);
                        leaf.position.y = 0.3 * stage;
                        leaf.position.x = (i === 0 ? 0.2 : -0.2) * stage;
                    });

                    this.flowerCenter.visible = false;
                    this.petals.forEach(petal => petal.visible = false);
                }
                // 阶段3: 成长 (0.4 - 0.6) - 花茎变高，叶子变大
                else if (progress < 0.6) {
                    const stage = (progress - 0.4) / 0.2;
                    this.stem.scale.y = 0.3 + 0.4 * stage;
                    this.stem.position.y = 0.5 * this.stem.scale.y;

                    this.leaves.forEach((leaf, i) => {
                        leaf.scale.set(0.5 + 0.5 * stage, 0.5 + 0.5 * stage, 1);
                        leaf.position.y = 0.5 + 0.3 * stage;
                        leaf.position.x = (i === 0 ? 0.3 : -0.3);
                    });

                    this.flowerCenter.visible = false;
                    this.petals.forEach(petal => petal.visible = false);
                }
                // 阶段4: 花苞 (0.6 - 0.8) - 花茎最大，花苞形成
                else if (progress < 0.8) {
                    const stage = (progress - 0.6) / 0.2;
                    this.stem.scale.y = 0.7 + 0.3 * stage;
                    this.stem.position.y = 0.5 * this.stem.scale.y;

                    this.leaves.forEach((leaf, i) => {
                        leaf.position.y = 0.8;
                    });

                    // 花苞出现（紧闭状态）
                    this.flowerCenter.visible = true;
                    this.flowerCenter.position.y = this.stem.scale.y + 0.5;
                    this.flowerCenter.scale.set(0.5 + 0.5 * stage, 0.5 + 0.5 * stage, 0.5 + 0.5 * stage);

                    this.petals.forEach((petal, i) => {
                        petal.visible = true;
                        const angle = (i / 6) * Math.PI * 2;
                        petal.position.x = Math.cos(angle) * 0.05;
                        petal.position.z = Math.sin(angle) * 0.05;
                        petal.position.y = this.flowerCenter.position.y;
                        petal.rotation.y = angle;
                        petal.scale.set(0.3, 0.3, 1);
                    });
                }
                // 阶段5: 盛开 (0.8 - 1.0) - 花瓣展开
                else {
                    const stage = (progress - 0.8) / 0.2;
                    this.stem.scale.y = 1;
                    this.stem.position.y = 0.5;

                    this.flowerCenter.position.y = 1.5;
                    this.flowerCenter.scale.set(1, 1, 1);

                    this.petals.forEach((petal, i) => {
                        const angle = (i / 6) * Math.PI * 2;
                        const radius = 0.05 + 0.4 * stage;
                        petal.position.x = Math.cos(angle) * radius;
                        petal.position.z = Math.sin(angle) * radius;
                        petal.position.y = 1.5;
                        petal.rotation.y = angle;
                        petal.rotation.x = -0.3 * stage; // 花瓣向外倾斜
                        petal.scale.set(0.3 + 0.7 * stage, 0.3 + 0.7 * stage, 1);
                    });
                }
            }

            remove() {
                scene.remove(this.group);
                // 清理几何体和材质
                this.group.traverse(obj => {
                    if (obj.geometry) obj.geometry.dispose();
                    if (obj.material) obj.material.dispose();
                });
            }
        }

        // ==================== Three.js 场景初始化 ====================
        function initScene() {
            // 场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x091F2F);

            // 相机
            camera = new THREE.PerspectiveCamera(
                60,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.set(0, 18, 30);
            camera.lookAt(0, 2, 0);

            // 渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 环境光
            ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            // 方向光 (带阴影)
            directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 20, 10);
            directionalLight.castShadow = true;
            directionalLight.shadow.camera.left = -30;
            directionalLight.shadow.camera.right = 30;
            directionalLight.shadow.camera.top = 30;
            directionalLight.shadow.camera.bottom = -30;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            scene.add(directionalLight);

            // 草地平台 (3D立方体：上面草皮，侧面和底部泥土) - 加大尺寸
            const platformWidth = 60;  // 从40增加到60
            const platformHeight = 3;   // 从2增加到3
            const platformDepth = 40;   // 从25增加到40

            const grassMaterial = new THREE.MeshStandardMaterial({
                color: 0x5FA684,
                roughness: 0.8
            });

            const soilMaterial = new THREE.MeshStandardMaterial({
                color: 0x6B4423, // 泥土棕色
                roughness: 0.9
            });

            // 创建立方体，每个面使用不同材质
            const materials = [
                soilMaterial,  // 右侧
                soilMaterial,  // 左侧
                grassMaterial, // 顶部（草皮）
                soilMaterial,  // 底部（泥土）
                soilMaterial,  // 前面
                soilMaterial   // 后面
            ];

            const groundGeometry = new THREE.BoxGeometry(platformWidth, platformHeight, platformDepth);
            ground = new THREE.Mesh(groundGeometry, materials);
            ground.position.y = -platformHeight / 2; // 让顶面在y=0处
            ground.receiveShadow = true;
            ground.castShadow = true;
            scene.add(ground);

            // 窗口大小调整
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // ==================== 音频检测系统 ====================
        async function initAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);

                analyser.fftSize = 256;
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);

                microphone.connect(analyser);

                isListening = true;
                document.getElementById('start-btn').textContent = '监听中...';
                document.getElementById('start-btn').disabled = true;

                return true;
            } catch (error) {
                alert('无法访问麦克风，请检查权限设置！');
                console.error('麦克风访问失败:', error);
                return false;
            }
        }

        // 计算实时分贝值
        function getDecibel() {
            if (!analyser) return 0;

            analyser.getByteFrequencyData(dataArray);

            // 计算平均音量
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i];
            }
            const average = sum / dataArray.length;

            // 转换为分贝 (简化公式)
            const decibel = Math.min(100, Math.max(0, average * 0.5));
            return Math.round(decibel);
        }

        // ==================== 花朵生长逻辑 ====================
        function getNextFlowerPosition() {
            const index = bloomedFlowers.length;
            if (index >= 40) return null;

            // 从后往前、从左往右生长
            const row = Math.floor(index / GRID_COLS);  // 行：从0到4
            const col = index % GRID_COLS;               // 列：从0到7

            // X坐标：从左(-21)到右(21)，间距6
            const x = -21 + col * FLOWER_SPACING;
            // Z坐标：从后(-12)到前(12)，间距6
            const z = -12 + row * FLOWER_SPACING;

            return { x, z };
        }

        function spawnNewFlower() {
            const pos = getNextFlowerPosition();
            if (!pos) return;

            currentFlower = new Flower(pos.x, pos.z);
            growthProgress = 0;
            growthStartTime = Date.now();
        }

        function killCurrentFlower() {
            if (currentFlower) {
                currentFlower.remove();
                currentFlower = null;
                growthProgress = 0;
                growthStartTime = null;
            }
        }

        function completeCurrentFlower() {
            if (currentFlower) {
                bloomedFlowers.push(currentFlower);
                currentFlower = null;
                growthProgress = 0;
                growthStartTime = null;

                // 保存到 localStorage
                saveProgress();

                // 检查是否完成40朵
                if (bloomedFlowers.length >= 40) {
                    showSuccessModal();
                } else {
                    // 继续种下一朵
                    spawnNewFlower();
                }
            }
        }

        // ==================== localStorage 持久化（已禁用）====================
        function saveProgress() {
            // 不再保存到 localStorage
            // localStorage.setItem('bloomedFlowers', JSON.stringify(flowerData));
        }

        function loadProgress() {
            // 不再从 localStorage 加载
            // 每次启动都是全新开始
        }

        function resetProgress() {
            // 移除所有花朵
            bloomedFlowers.forEach(f => f.remove());
            bloomedFlowers = [];
            killCurrentFlower();

            // 清除 localStorage
            localStorage.removeItem('bloomedFlowers');

            // 重置所有UI显示
            growthProgress = 0;
            growthStartTime = null;

            // 立即更新UI
            updateUI();

            // 如果正在监听，重新开始
            if (isListening) {
                spawnNewFlower();
            }
        }

        // ==================== UI 更新 ====================
        function updateUI() {
            // 更新分贝显示
            document.getElementById('decibel-value').textContent = currentDecibel;

            // 更新花朵计数
            document.getElementById('flower-count').textContent = bloomedFlowers.length;

            // 更新剩余时间
            if (currentFlower && growthStartTime) {
                const elapsed = Date.now() - growthStartTime;
                const remaining = Math.max(0, Math.ceil((GROWTH_DURATION - elapsed) / 1000));
                document.getElementById('remaining-time').textContent = remaining;
            } else {
                document.getElementById('remaining-time').textContent = 0;  // 改为0而不是60
            }

            // 更新进度条（满后立即清空，不回弹）
            const progressBar = document.getElementById('progress-bar');
            if (currentFlower && growthProgress > 0 && growthProgress < 1) {
                progressBar.className = 'gradient-bg h-full progress-bar-transition';
                progressBar.style.width = (growthProgress * 100) + '%';
            } else {
                progressBar.className = 'gradient-bg h-full progress-bar-instant';
                progressBar.style.width = '0%';
            }

            // 更新状态指示器
            const indicator = document.getElementById('status-indicator');
            const statusText = document.getElementById('status-text');
            if (currentDecibel < decibelThreshold) {
                indicator.className = 'status-indicator status-quiet pulse-anim';
                statusText.textContent = '安静';
            } else {
                indicator.className = 'status-indicator status-loud pulse-anim';
                statusText.textContent = '吵闹';
            }
        }

        function showSuccessModal() {
            document.getElementById('success-modal').classList.remove('hidden');
            document.getElementById('success-modal').classList.add('flex');
        }

        function hideSuccessModal() {
            document.getElementById('success-modal').classList.add('hidden');
            document.getElementById('success-modal').classList.remove('flex');
        }

        // ==================== 动画循环 ====================
        function animate() {
            requestAnimationFrame(animate);

            if (isListening) {
                // 获取当前分贝
                currentDecibel = getDecibel();

                // 生长/死亡逻辑
                if (currentDecibel < decibelThreshold) {
                    // 安静：生长
                    if (!currentFlower && bloomedFlowers.length < 40) {
                        spawnNewFlower();
                    }

                    if (currentFlower && growthStartTime) {
                        const elapsed = Date.now() - growthStartTime;
                        growthProgress = Math.min(1, elapsed / GROWTH_DURATION);
                        currentFlower.update(growthProgress);

                        // 检查是否完成生长
                        if (growthProgress >= 1) {
                            completeCurrentFlower();
                        }
                    }
                } else {
                    // 吵闹：杀死正在生长的花朵
                    if (currentFlower && growthProgress < 1) {
                        killCurrentFlower();
                    }
                }
            }

            updateUI();
            renderer.render(scene, camera);
        }

        // ==================== 事件监听 ====================
        document.getElementById('start-btn').addEventListener('click', async () => {
            const success = await initAudio();
            if (success && bloomedFlowers.length < 40) {
                spawnNewFlower();
            }
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            if (confirm('确定要重置所有进度吗？')) {
                resetProgress();
                hideSuccessModal();
            }
        });

        document.getElementById('restart-btn').addEventListener('click', () => {
            resetProgress();
            hideSuccessModal();
        });

        document.getElementById('threshold-slider').addEventListener('input', (e) => {
            decibelThreshold = parseInt(e.target.value);
            document.getElementById('threshold-value').textContent = decibelThreshold;
        });

        // ==================== 初始化 ====================
        initScene();
        loadProgress();
        animate();
    </script>
</body>

</html>
