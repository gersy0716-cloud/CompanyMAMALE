<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初中化学可视化学习平台 (学生专用)</title>
    <!-- Google Fonts: Inter & Noto Sans SC (High Weights) -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Noto+Sans+SC:wght@400;700;900&display=swap"
        rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
    <!-- 3Dmol.js -->
    <script src="https://3Dmol.org/build/3Dmol-min.js"></script>
    <!-- p5.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <!-- MathJax -->
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body>
    <header class="app-header shadow-sm">
        <div class="container-fluid d-flex align-items-center justify-content-between mx-auto">
            <div class="logo-area">
                <div class="logo-icon">
                    <svg viewBox="0 0 64 64" width="40" height="40" fill="none" stroke="currentColor" stroke-width="3"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M26 8h12M30 8v16L16 52c-1 2 0 4 3 4h26c3 0 4-2 3-4L34 24V8" />
                    </svg>
                </div>
                <div class="app-title">初中化学可视化平台</div>
            </div>
            <nav class="nav-pills">
                <button class="nav-item active" data-module="home">概览</button>
                <button class="nav-item" data-module="micro">微观世界</button>
                <button class="nav-item" data-module="reaction">化学反应</button>
                <button class="nav-item" data-module="lab">虚拟实验室</button>
            </nav>
        </div>
    </header>

    <main id="app-viewport">
        <!-- 首页: Launchpad Dashboard -->
        <section id="home-module" class="app-module active welcome-hero">
            <div class="hero-text">
                <h2>开启化学微观探索之旅</h2>
                <p>同步人教版初中化学课标，通过极简、科学的可视化交互，带你深入物质本质。</p>
            </div>

            <div class="module-launcher">
                <!-- 微观世界 -->
                <div class="launcher-card" data-goto="micro" style="--card-color: #1E88E5;">
                    <div class="icon-box" style="background: rgba(30, 136, 229, 0.1);">
                        <svg viewBox="0 0 64 64" width="56" height="56" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="32" cy="32" r="8" />
                            <circle cx="32" cy="32" r="22" stroke-dasharray="4 4" />
                            <circle cx="50" cy="18" r="3" fill="currentColor" />
                        </svg>
                    </div>
                    <h3>微观世界</h3>
                    <p>原子核外电子排布、3D分子模型立体拆解。</p>
                    <button class="btn-launch">进入探索</button>
                </div>

                <!-- 化学反应 -->
                <div class="launcher-card" data-goto="reaction" style="--card-color: #10B981;">
                    <div class="icon-box" style="background: rgba(16, 185, 129, 0.1);">
                        <svg viewBox="0 0 64 64" width="56" height="56" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M32 12c-11 0-20 9-20 20s9 20 20 20" />
                            <path d="M32 12v10l8-10-8-10v10" />
                            <path d="M32 52v-10l-8 10 8 10v-10" />
                            <circle cx="32" cy="32" r="4" fill="currentColor" />
                        </svg>
                    </div>
                    <h3>化学反应</h3>
                    <p>宏观实验现象与微观粒子物理碰撞同步观察。</p>
                    <button class="btn-launch">查看反应</button>
                </div>

                <!-- 虚拟实验室 -->
                <div class="launcher-card" data-goto="lab" style="--card-color: #7C3AED;">
                    <div class="icon-box" style="background: rgba(124, 58, 237, 0.1);">
                        <svg viewBox="0 0 64 64" width="56" height="56" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M16 8v44c0 2.2 1.8 4 4 4h24c2.2 0 4-1.8 4-4V8M14 8h36M24 8v10M32 8v20" />
                        </svg>
                    </div>
                    <h3>虚拟实验室</h3>
                    <p>沉浸式仿真操作，复刻高锰酸钾制取氧气等核心实验。</p>
                    <button class="btn-launch">开始实验</button>
                </div>
            </div>
        </section>

        <!-- 详细模块容器 -->
        <section id="micro-module" class="app-module"></section>
        <section id="reaction-module" class="app-module"></section>
        <section id="lab-module" class="app-module"></section>
    </main>

    <!-- Core App Logic -->
    <script src="app.js"></script>
</body>

</html>
