<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>二氧化碳的制取与性质 - 动效优化版</title>
<style>
    :root {
        --bg-color: #F8FAFC;
        --panel-bg: #FFFFFF;
        --primary-color: #3B82F6;
        --secondary-color: #F59E0B;
        --text-dark: #1E293B;
        --text-light: #64748B;
        --glass-color: rgba(255, 255, 255, 0.4);
        --glass-border: #94A3B8;
        --liquid-acid: rgba(186, 230, 253, 0.6);
        --liquid-limewater: rgba(248, 250, 252, 0.3);
        --gas-color: rgba(203, 213, 225, 0.5);
    }

    body {
        margin: 0; padding: 0;
        background-color: var(--bg-color);
        font-family: 'PingFang SC', sans-serif;
        display: flex; justify-content: center; align-items: center;
        height: 100vh; overflow: hidden;
    }

    #app-container {
        width: 1000px; height: 600px;
        background: var(--panel-bg);
        border-radius: 32px;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
        position: relative; overflow: hidden;
        border: 4px solid #E2E8F0;
    }

    .controls {
        position: absolute; left: 40px; top: 40px;
        width: 240px; z-index: 10;
    }

    .title-box h1 { font-size: 26px; color: var(--text-dark); margin: 0 0 10px 0; }
    .title-box p { font-size: 14px; color: var(--text-light); margin: 0; }

    .btn-group { display: flex; flex-direction: column; gap: 14px; margin-top: 30px; }

    button {
        background: #F1F5F9; border: 2px solid transparent;
        color: var(--text-dark); padding: 14px 18px;
        border-radius: 16px; font-size: 15px; font-weight: 600;
        cursor: pointer; transition: all 0.2s ease;
        display: flex; align-items: center; justify-content: space-between;
    }

    button:hover:not(:disabled) { background: #E2E8F0; }
    button.active {
        background: var(--primary-color); color: white;
        box-shadow: 0 8px 15px rgba(59, 130, 246, 0.3);
    }

    .action-btn {
        background: var(--secondary-color); color: white;
        margin-top: 25px; justify-content: center; font-size: 17px;
        border: none; width: 100%;
    }

    .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #tooltip {
        position: absolute; background: #1E293B; color: white;
        padding: 10px 15px; border-radius: 10px; font-size: 14px;
        pointer-events: none; opacity: 0; transition: opacity 0.2s;
        z-index: 100;
    }

    svg { width: 100%; height: 100%; }
    .glass-tube { fill: var(--glass-color); stroke: var(--glass-border); stroke-width: 2.5; }
    .interactive-node { cursor: help; }

    /* 优化后的火苗：更柔和 */
    @keyframes flameFlicker {
        0% { transform: scale(1); opacity: 0.9; }
        50% { transform: scale(1.05); opacity: 1; }
        100% { transform: scale(0.98); opacity: 0.95; }
    }
    .flame-core { 
        transform-origin: center bottom; 
        animation: flameFlicker 0.8s infinite ease-in-out; 
    }
    .extinguished .flame-core { display: none; }

    /* 优化后的气泡：距离大幅缩小，从小变大再消失 */
    @keyframes bubbleRise {
        0% { transform: translateY(0) scale(0.3); opacity: 0; }
        20% { opacity: 0.7; }
        100% { transform: translateY(-30px) scale(0.8); opacity: 0; }
    }
    .bubbling .bubble-atom { animation: bubbleRise 1s infinite ease-out; }

    /* 优化后的气流：密集的点状滚动，间距极小 */
    @keyframes flowDashed { to { stroke-dashoffset: -20; } }
    .gas-flow-line {
        stroke-dasharray: 2 5; /* 缩小间距 */
        animation: flowDashed 1.2s linear infinite;
        stroke: #94A3B8 !important;
        stroke-opacity: 0.8;
    }

    .scene { opacity: 0; visibility: hidden; transition: opacity 0.4s; }
    .scene.active { opacity: 1; visibility: visible; }
    .hidden { display: none; }
</style>
</head>
<body>

<div id="app-container">
    <div class="controls">
        <div class="title-box">
            <h1>探秘二氧化碳</h1>
            <p>九年级化学实验室</p>
        </div>
        <div class="btn-group">
            <button class="scene-btn active" data-scene="1">1. 制取与验满 🧪</button>
            <button class="scene-btn" data-scene="2">2. 性质：密度 🕯️</button>
            <button class="scene-btn" data-scene="3">3. 性质：检验 💧</button>
        </div>
        <button id="main-action" class="action-btn">开始制取</button>
    </div>

    <div id="tooltip"></div>

    <svg viewBox="0 0 1000 600">
        <defs>
            <radialGradient id="fireGrad">
                <stop offset="20%" stop-color="#FFEB3B"/>
                <stop offset="60%" stop-color="#FB8C00"/>
                <stop offset="100%" stop-color="#F4511E" stop-opacity="0"/>
            </radialGradient>
        </defs>

        <!-- 实验台 -->
        <rect x="300" y="460" width="660" height="15" rx="5" fill="#E2E8F0"/>
        <text id="stage-info" x="630" y="70" text-anchor="middle" font-size="16" fill="#3B82F6" font-weight="bold">长颈漏斗末端应在液面以下（液封）</text>

        <!-- 场景1：发生与收集 -->
        <g id="scene-1" class="scene active">
            <g transform="translate(420, 260)">
                <path class="glass-tube interactive-node" data-tip="锥形瓶：反应容器。" d="M-30,-40 L-30,20 Q-30,40 -50,60 L-80,140 Q-85,150 -70,150 L70,150 Q85,150 80,140 L50,60 Q30,40 30,20 L30,-40 Z"/>
                <path fill="var(--liquid-acid)" d="M-65,110 L65,110 L78,140 Q82,150 70,150 L-70,150 Q-82,150 -78,140 Z"/>
                <g id="s1-bubbles" class="hidden">
                    <circle class="bubble-atom" cx="-20" cy="135" r="2.5" fill="white"/>
                    <circle class="bubble-atom" cx="15" cy="138" r="3" fill="white" style="animation-delay: 0.3s"/>
                    <circle class="bubble-atom" cx="-5" cy="130" r="2" fill="white" style="animation-delay: 0.6s"/>
                </g>
                <g transform="translate(0, 140)">
                    <circle cx="-30" cy="0" r="7" fill="#94A3B8"/><circle cx="5" cy="2" r="6" fill="#64748B"/><circle cx="35" cy="-2" r="8" fill="#CBD5E1"/>
                </g>
                <rect x="-32" y="-45" width="64" height="20" fill="#57534E" rx="4"/>
                <path class="glass-tube" d="M-15,-180 L5,-180 L-5,-100 L-5,125 L-15,125 L-15,-100 Z"/>
                <path id="s1-tube" fill="none" stroke="#94A3B8" stroke-width="4" d="M10,-35 L10,-90 Q10,-100 20,-100 L160,-100 Q170,-100 170,-90 L170,190"/>
            </g>
            <g transform="translate(590, 240)">
                <rect id="s1-gas-fill" x="-45" y="210" width="90" height="0" fill="var(--gas-color)"/>
                <path class="glass-tube interactive-node" data-tip="向上排空气法收集" d="M-45,210 L-45,60 Q-45,50 -35,40 L-35,10 L35,10 L35,40 Q45,50 45,60 L45,210 Q45,220 35,220 L-35,220 Q-45,220 -45,210 Z"/>
                <rect x="-30" y="5" width="80" height="4" fill="#E2E8F0" rx="2"/>
                <g id="splint" transform="translate(10, 5) rotate(-30)">
                <rect x="-2" y="0" width="4" height="60" fill="#78350F" rx="1"/>
                <path class="flame-core" d="M0,0 Q6,-8 0,-20 Q-6,-8 0,0" fill="url(#fireGrad)"/>
            </g>
            </g>
        </g>

        <!-- 场景2：性质 - 密度 -->
        <g id="scene-2" class="scene">
            <g id="s2-pour-bottle" transform="translate(480, 180)">
                <path class="glass-tube" d="M-40,140 L-40,60 Q-40,50 -30,40 L-30,10 L30,10 L30,40 Q40,50 40,60 L40,140 Q40,150 30,150 L-30,150 Q-40,150 -40,140 Z"/>
                <rect id="s2-internal-gas" x="-38" y="50" width="76" height="95" fill="var(--gas-color)"/>
            </g>
            <g transform="translate(620, 310)">
                <path class="glass-tube" d="M-60,10 L-60,140 Q-60,150 -50,150 L50,150 Q60,150 60,140 L60,10" fill="none"/>
                <rect id="s2-beaker-gas" x="-58" y="150" width="116" height="0" fill="var(--gas-color)"/>
                <g id="candle-low" transform="translate(15, 120)">
                    <rect x="-6" y="0" width="12" height="25" fill="#F1F5F9" rx="2"/>
                    <path class="flame-core" d="M0,0 Q4,-6 0,-12 Q-4,-6 0,0" fill="url(#fireGrad)"/>
                </g>
                <g id="candle-high" transform="translate(-25, 80)">
                    <rect x="-6" y="0" width="12" height="25" fill="#F1F5F9" rx="2"/>
                    <path class="flame-core" d="M0,0 Q4,-6 0,-12 Q-4,-6 0,0" fill="url(#fireGrad)"/>
                </g>
            </g>
        </g>

        <!-- 场景3：性质 - 变浑浊 -->
        <g id="scene-3" class="scene">
            <g transform="translate(420, 250)">
                <path class="glass-tube" d="M-15,0 L-15,140 Q-15,160 0,160 Q15,160 15,140 L15,0 Z"/>
                <rect x="-17" y="-5" width="34" height="15" fill="#57534E" rx="2"/>
                <path id="s3-tube" fill="none" stroke="#94A3B8" stroke-width="4" d="M0,0 L0,-50 Q0,-60 10,-60 L180,-60 Q190,-60 190,-50 L190,200"/>
            </g>
            <g transform="translate(610, 320)">
                <path class="glass-tube" d="M-50,0 L-50,130 Q-50,140 -40,140 L40,140 Q50,140 50,130 L50,0" fill="none"/>
                <rect id="s3-liquid" x="-48" y="60" width="96" height="78" fill="var(--liquid-limewater)" rx="2"/>
                <g id="s3-bubbles" class="hidden">
                    <circle class="bubble-atom" cx="0" cy="135" r="2.5" fill="white"/>
                    <circle class="bubble-atom" cx="-10" cy="130" r="2" fill="white" style="animation-delay: 0.4s"/>
                </g>
                <text id="s3-eq" x="0" y="180" text-anchor="middle" font-size="16" fill="#D97706" font-weight="bold" opacity="0">Ca(OH)₂ + CO₂ = CaCO₃↓ + H₂O</text>
            </g>
        </g>
    </svg>
</div>

<script>
    const state = { current: 1, animating: false, timer: null };
    const elements = {
        mainBtn: document.getElementById('main-action'),
        tooltip: document.getElementById('tooltip'),
        info: document.getElementById('stage-info'),
        scenes: [null, document.getElementById('scene-1'), document.getElementById('scene-2'), document.getElementById('scene-3')],
        btns: document.querySelectorAll('.scene-btn')
    };

    const CONFIG = {
        1: { text: "开始制取", info: "长颈漏斗末端应在液面以下（液封）" },
        2: { text: "倾倒气体", info: "二氧化碳密度比空气大，不支持燃烧" },
        3: { text: "通入气体", info: "二氧化碳能使澄清石灰水变浑浊" }
    };

    // 交互提示
    document.querySelectorAll('.interactive-node').forEach(node => {
        node.onmouseenter = (e) => { elements.tooltip.textContent = node.dataset.tip; elements.tooltip.style.opacity = '1'; };
        node.onmousemove = (e) => { elements.tooltip.style.left = (e.clientX + 20) + 'px'; elements.tooltip.style.top = (e.clientY + 20) + 'px'; };
        node.onmouseleave = () => elements.tooltip.style.opacity = '0';
    });

    elements.btns.forEach(btn => {
        btn.onclick = () => { if(!state.animating) switchScene(parseInt(btn.dataset.scene)); };
    });

    function switchScene(index) {
        resetAll();
        state.current = index;
        elements.btns.forEach(b => b.classList.toggle('active', parseInt(b.dataset.scene) === index));
        elements.scenes.forEach((s, i) => { if(s) s.classList.toggle('active', i === index); });
        elements.mainBtn.textContent = CONFIG[index].text;
        elements.info.textContent = CONFIG[index].info;
        elements.mainBtn.disabled = false;
    }

    function resetAll() {
        if(state.timer) {
            clearInterval(state.timer);
            state.timer = null;
        }
        state.animating = false;
        document.querySelectorAll('.bubbling, .gas-flow-line, .extinguished').forEach(el => {
            el.classList.remove('bubbling', 'gas-flow-line', 'extinguished');
        });
        document.querySelectorAll('.hidden').forEach(el => el.classList.add('hidden'));
        
        // 安全地操作DOM元素
        const s1GasFill = document.getElementById('s1-gas-fill');
        if(s1GasFill) {
            s1GasFill.setAttribute('height', '0');
        }
        
        const s2PourBottle = document.getElementById('s2-pour-bottle');
        if(s2PourBottle) {
            s2PourBottle.style.transition = "none";
            s2PourBottle.style.transform = 'translate(480px, 180px) rotate(0deg)';
        }
        
        const s2InternalGas = document.getElementById('s2-internal-gas');
        if(s2InternalGas) {
            s2InternalGas.style.transition = "none";
            s2InternalGas.style.opacity = '1';
        }
        
        const s2BeakerGas = document.getElementById('s2-beaker-gas');
        if(s2BeakerGas) {
            s2BeakerGas.setAttribute('height', '0');
        }
        
        const s3Liquid = document.getElementById('s3-liquid');
        if(s3Liquid) {
            s3Liquid.style.transition = "none";
            s3Liquid.style.fill = 'var(--liquid-limewater)';
        }
        
        const s3Eq = document.getElementById('s3-eq');
        if(s3Eq) {
            s3Eq.style.opacity = '0';
        }
    }

    elements.mainBtn.onclick = () => {
        if(state.animating) return;
        state.animating = true;
        elements.mainBtn.disabled = true;
        if(state.current === 1) playScene1();
        else if(state.current === 2) playScene2();
        else if(state.current === 3) playScene3();
    };

    function playScene1() {
        const s1Bubbles = document.getElementById('s1-bubbles');
        const s1Tube = document.getElementById('s1-tube');
        const gas = document.getElementById('s1-gas-fill');
        const splint = document.getElementById('splint');
        
        if(s1Bubbles && s1Tube && gas && splint) {
            s1Bubbles.classList.remove('hidden');
            s1Bubbles.classList.add('bubbling');
            s1Tube.classList.add('gas-flow-line');
            let h = 0;
            
            if(state.timer) {
                clearInterval(state.timer);
                state.timer = null;
            }
            
            state.timer = setInterval(() => {
                h += 0.8;
                gas.setAttribute('height', h);
                gas.setAttribute('y', 210 - h);
                if(h >= 160) {
                    clearInterval(state.timer);
                    state.timer = null;
                    splint.classList.add('extinguished');
                    finish("收集并验满成功！");
                }
            }, 30);
        } else {
            console.error('Scene 1 elements not found');
            state.animating = false;
            elements.mainBtn.disabled = false;
        }
    }

    function playScene2() {
        const bottle = document.getElementById('s2-pour-bottle');
        const internalGas = document.getElementById('s2-internal-gas');
        const beakerGas = document.getElementById('s2-beaker-gas');
        const candleLow = document.getElementById('candle-low');
        const candleHigh = document.getElementById('candle-high');
        
        if(bottle && internalGas && beakerGas && candleLow && candleHigh) {
            bottle.style.transition = "transform 1.5s ease-in-out";
            bottle.style.transform = "translate(540px, 140px) rotate(-110deg)";
            
            setTimeout(() => {
                internalGas.style.transition = "opacity 1.5s";
                internalGas.style.opacity = "0";
                let h = 0;
                
                if(state.timer) {
                    clearInterval(state.timer);
                    state.timer = null;
                }
                
                state.timer = setInterval(() => {
                    h += 1.2;
                    beakerGas.setAttribute('height', h);
                    beakerGas.setAttribute('y', 150 - h);
                    if(h > 40) candleLow.classList.add('extinguished');
                    if(h > 95) candleHigh.classList.add('extinguished');
                    if(h >= 140) {
                        clearInterval(state.timer);
                        state.timer = null;
                        finish("性质验证：密度大且不助燃");
                    }
                }, 30);
            }, 1000);
        } else {
            console.error('Scene 2 elements not found');
            state.animating = false;
            elements.mainBtn.disabled = false;
        }
    }

    function playScene3() {
        const s3Tube = document.getElementById('s3-tube');
        const s3Bubbles = document.getElementById('s3-bubbles');
        const s3Liquid = document.getElementById('s3-liquid');
        const s3Eq = document.getElementById('s3-eq');
        
        if(s3Tube && s3Bubbles && s3Liquid && s3Eq) {
            s3Tube.classList.add('gas-flow-line');
            s3Bubbles.classList.remove('hidden');
            s3Bubbles.classList.add('bubbling');
            
            setTimeout(() => {
                s3Liquid.style.transition = "fill 2s ease";
                s3Liquid.style.fill = "#E2E8F0";
                setTimeout(() => {
                    s3Eq.style.opacity = "1";
                    finish("检验成功：变浑浊");
                }, 1000);
            }, 500);
        } else {
            console.error('Scene 3 elements not found');
            state.animating = false;
            elements.mainBtn.disabled = false;
        }
    }

    function finish(msg) { 
        state.animating = false; 
        elements.mainBtn.textContent = msg; 
        // 核心：完成时立刻停止所有动画，移除类名
        document.querySelectorAll('.bubbling, .gas-flow-line').forEach(el => {
            el.classList.remove('bubbling', 'gas-flow-line');
        });
        // 确保定时器被清理
        if(state.timer) {
            clearInterval(state.timer);
            state.timer = null;
        }
    }
</script>
</body>
</html>
