<!-- Borrow Icon (借阅 - 拿走) -->
<svg width="200" height="200" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shelf Background -->
  <path d="M50 400 H462" stroke="#adb5bd" stroke-width="20" stroke-linecap="round"/>
  <!-- Static Books (Gray) -->
  <rect x="80" y="200" width="60" height="200" rx="10" fill="#dee2e6" />
  <rect x="150" y="200" width="60" height="200" rx="10" fill="#dee2e6" />
  <!-- Moving Book (Blue) -->
  <g transform="translate(100, -80) rotate(10)">
    <rect x="220" y="150" width="80" height="200" rx="15" fill="#4dabf7" stroke="#339af0" stroke-width="5"/>
    <path d="M320 180 L420 80 M420 80 L370 80 M420 80 L420 130" stroke="#51cf66" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>

<!-- Return Icon (归还 - 放入) -->
<svg width="200" height="200" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shelf Background -->
  <path d="M50 400 H462" stroke="#adb5bd" stroke-width="20" stroke-linecap="round"/>
  <!-- Static Books (Gray) -->
  <rect x="80" y="200" width="60" height="200" rx="10" fill="#dee2e6" />
  <rect x="372" y="200" width="60" height="200" rx="10" fill="#dee2e6" />
  <!-- Moving Book (Orange) -->
  <g transform="translate(0, -100)">
    <rect x="226" y="150" width="80" height="200" rx="15" fill="#ff922b" stroke="#f76707" stroke-width="5"/>
    <path d="M266 120 V20 M266 120 L236 90 M266 120 L296 90" stroke="#ff6b6b" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
